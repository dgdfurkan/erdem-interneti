<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="./favicon.png">
  <link href="https://fonts.cdnfonts.com/css/andale-mono" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <title>ESER MİKTAR</title>
  <meta name="description" content="ESER MİKTAR is a 3D gallery project showcasing creative designs.">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="white-fade"></div>

  <!-- NAV -->
  <header>
    <nav>
      <ul>
        <li><button class="nav-btn" id="btn-back" style="display: none;"><span data-i18n-key="nav_projects">Projects</span></button></li>
        <li><a class="nav-btn active" id="btn-home" href="#"><span data-i18n-key="nav_projects">Projects</span></a></li>
        <li><button class="nav-btn" id="btn-about"><span data-i18n-key="nav_about">About</span></button></li>
      </ul>
    </nav>
    <div id="top-right-wrap">
      <div id="mode-toggle">
        <button class="mode-btn active" data-mode="3d"><span data-i18n-key="mode_3d">3D</span></button>
        <span class="mode-sep">/</span>
        <button class="mode-btn" data-mode="grid"><span data-i18n-key="mode_grid">GRID</span></button>
      </div>
      <div id="project-layout-toggle" style="display: none;">
        <button class="layout-btn active" data-layout="horiz"><span data-i18n-key="layout_horiz">HORIZ</span></button>
        <span class="layout-sep">/</span>
        <button class="layout-btn" data-layout="vert"><span data-i18n-key="layout_vert">VERT</span></button>
      </div>
      <div id="lang-toggle">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      
      <!-- Theme Toggle -->
      <label for="theme" class="theme">
        <span class="theme__toggle-wrap">
          <input id="theme" class="theme__toggle" type="checkbox" role="switch" name="theme" value="dark">
          <span class="theme__fill"></span>
          <span class="theme__icon">
            <span class="theme__icon-part"></span>
            <span class="theme__icon-part"></span>
            <span class="theme__icon-part"></span>
            <span class="theme__icon-part"></span>
            <span class="theme__icon-part"></span>
            <span class="theme__icon-part"></span>
            <span class="theme__icon-part"></span>
            <span class="theme__icon-part"></span>
            <span class="theme__icon-part"></span>
          </span>
        </span>
      </label>
    </div>
  </header>

  <!-- APP ROOT -->
  <div id="app"></div>

  <!-- CURSOR LABEL -->
  <span id="cursor-label"></span>

  <div id="blur-overlay"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
