<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="./favicon.png">
  <link href="https://fonts.cdnfonts.com/css/andale-mono" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <title>ESER MİKTAR</title>
  <meta name="description" content="ESER MİKTAR is a 3D gallery project showcasing creative designs.">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="white-fade"></div>

  <!-- NAV -->
  <header>
    <nav>
      <ul>
        <li><button class="nav-btn" id="btn-back" style="display: none;"><span data-i18n-key="nav_projects">Projects</span></button></li>
        <li><a class="nav-btn active" id="btn-home" href="#"><span data-i18n-key="nav_projects">Projects</span></a></li>
        <li><button class="nav-btn" id="btn-about"><span data-i18n-key="nav_about">About</span></button></li>
      </ul>
    </nav>
    <div class="logo">esermiktar®️</div>
    <div id="top-right-wrap">
      <div id="project-layout-toggle" style="display: none;">
        <button class="layout-btn active" data-layout="horiz" title="Horizontal Layout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="8" height="12"/><rect x="14" y="6" width="8" height="12"/></svg>
        </button>
        <span class="layout-sep">/</span>
        <button class="layout-btn" data-layout="vert" title="Vertical Layout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="8"/><rect x="6" y="14" width="12" height="8"/></svg>
        </button>
      </div>
      <div id="lang-toggle">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      
      <!-- Theme Toggle (SVG) -->
      <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- APP ROOT -->
  <div id="app"></div>

  <!-- CURSOR LABEL -->
  <span id="cursor-label"></span>

  <!-- BOTTOM RIGHT TOGGLE (Home Page Only) -->
  <div id="home-view-toggle">
    <button class="view-btn active" data-mode="3d" title="3D View">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="view-sep">/</span>
    <button class="view-btn" data-mode="grid" title="Grid View">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
    </button>
  </div>

  <div id="blur-overlay"></div>
  
  <!-- BREATHING PRELOADER -->
  <div id="preloader">
    <div class="preloader-text">esermiktar</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
